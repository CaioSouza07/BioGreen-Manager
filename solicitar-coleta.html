<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="static/css/solicitar-coleta.css">
    <link rel="shortcut icon" href="/static/images/MiniLogo-Maior.ico" type="image/x-icon">
    <title>BioGreen Manager</title>
</head>
<body>
    <div id="container"> 
        <div id="header">
            <img id="logo-biogreen" src="/static/images/MiniLogo-Maior.png" alt="Logo da BioGreen">
            <img id="menu-burger" src="/static/images/menu-burger.png" alt="Menu-Burger">
        </div>

        <div id="content">
            <h2>Solicitar coleta de itens</h2>
            <div id="img-solicitar">
                <img src="/static/images/solicitar-coleta.png" alt="">
            </div>
            <div id="card-solicitar">
                <div id="card-linha">
                    <p>Endereço</p>
                    <p>Nº</p>
                    <input type="text" placeholder="Ex: Rua...">
                    <input type="number" placeholder="Ex: 1">
                </div>
                <p>Descrição</p>
                <input type="text" name="" id="" placeholder="Ex: Preciso descartar uma cama e...">
                <p>Foto dos itens</p>
                <button>
                    <img src="/static/images/btn-add-img.png" alt="">
                </button>
                <a id="btn-solicitar" href="/home.html">Solicitar</a>
            </div>
        </div>
      
        <div id="menu-inferior">
            <a href="/chat.html" id="btn-chat">
                <img src="/static/images/btn-chat.png" alt="">
            </a>
            <a href="/solicitacoes.html" id="btn-solicitacoes">
                <img src="/static/images/btn-solicitacoes.png" alt="">
            </a>
            <a href="/home.html" id="btn-home">
                <img src="/static/images/btn-home.png" alt="">
            </a>
            <a href="/noticias.html" id="btn-noticias">
                <img src="/static/images/btn-noticias.png" alt="">
            </a>
            <a href="/notificacoes.html" id="btn-notificacoes">
                <img src="/static/images/btn-notificacoes.png" alt="">
            </a>
        </div>
        
    </div>
</body>
</html>
