<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/css/cadastrar.css">
    <link rel="shortcut icon" href="/static/images/MiniLogo-Maior.ico" type="image/x-icon">
    <title>BioGreen Manager</title>
</head>
<body>
    <div id="container"> 
        <div id="header">
            <img src="/static/images/MiniLogo-Maior.png" alt="Logo da BioGreen">
        </div>
        <div id="card-cadastro">
            <h1>Cadastrar</h1>
            <form action="">

                <input type="text" name="" id="" placeholder="Nome completo">
                
                <input type="text" name="" id="" placeholder="E-mail">
                
                <input type="text" name="" id="" placeholder="CPF">
                
                <input type="text" name="" id="" placeholder="CEP">
                
                <input type="text" name="" id="" placeholder="Senha">
                
                <input type="text" name="" id="" placeholder="Confirmar senha">
                
                <a id="btn-cadastrar" href="/home.html">Cadastrar</a>
                <!-- <button type="submit">Cadastrar</button> -->
            </form>
        </div>
        <div id="link-entrar">
            <p>Já possuí uma conta?</p>
            <a href="/entrar.html">Entrar</a>
        </div>
    </div>
</body>
</html>
